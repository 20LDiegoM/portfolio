name: Deploy Portfolio to Raspberry Pi

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start Cloudflare TCP proxy to SSH
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          cloudflared access tcp \
            --hostname ssh.murcia-dev.com \
            --url 127.0.0.1:2222 \
            --service-token-id "$CF_ACCESS_CLIENT_ID" \
            --service-token-secret "$CF_ACCESS_CLIENT_SECRET" \
            --loglevel error &
          sleep 3

      - name: Deploy
        env:
          PI_USER: ${{ secrets.PI_USER }}
          PI_SSH_KEY: ${{ secrets.PI_SSH_KEY }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "$PI_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -p 2222 -o StrictHostKeyChecking=no "$PI_USER@127.0.0.1" << 'EOF'
            set -e

            cd ~/docker/portfolio

            echo "🔄 Pull latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "📦 Install dependencies..."
            npm ci --no-audit --no-fund

            echo "🏗 Build assets..."
            npm run build

            echo "🔁 Restart nginx..."
            docker restart portfolio_site

            echo "✅ Deploy complete"
          EOF